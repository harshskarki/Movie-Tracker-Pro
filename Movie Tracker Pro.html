```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🎬 Movie Tracker Pro</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
  color: white;
  text-align: center;
  margin: 0;
  padding: 0 0 60px 0;
}

h1 { color: #e50914; }

input, select {
  padding: 10px;
  margin: 5px;
  border-radius: 5px;
  border: none;
  background: #2a2a2a;
  color: white;
}

button {
  padding: 10px;
  background: #e50914;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 5px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  background: #ff1f1f;
}

/* Stats */
#statsBar {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  margin: 10px;
}

.stat-chip {
  background: #1c1c1c;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 13px;
}

.stat-chip span {
  color: #e50914;
  font-weight: bold;
}

/* Filters */
#filters {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px;
}

.filter-pill {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid #444;
  background: transparent;
  color: #aaa;
  cursor: pointer;
}

.filter-pill.active {
  background: #e50914;
  color: white;
}

/* Grid */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: #1c1c1c;
  padding: 10px;
  border-radius: 10px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.watched { text-decoration: line-through; color: gray; }
.favorite { color: gold; }

.small-btn {
  margin: 3px;
  padding: 5px;
  font-size: 12px;
}

/* Progress */
#progressBar {
  width: 80%;
  margin: 10px auto;
  background: #333;
  border-radius: 10px;
}

#progress {
  height: 10px;
  background: #e50914;
  width: 0%;
  border-radius: 10px;
}

/* Toast */
#toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  padding: 10px 20px;
  border-radius: 5px;
  display: none;
}

#EmptyMsg {
  display: none;
  margin-top: 20px;
  color: #555;
}
</style>
</head>

<body>

<h1>🎬 Movie Tracker Pro</h1>

<input id="movieInput" placeholder="Movie name">
<select id="Category">
  <option>Action</option>
  <option>Comedy</option>
  <option>Drama</option>
  <option>Horror</option>
</select>

<button onclick="addMovie()">Add</button>
<button onclick="randomMovie()">🎲 Surprise Me</button>

<br>
<input id="searchInput" placeholder="Search..." onkeyup="applyFilters()">

<!-- Stats -->
<div id="statsBar">
  <div class="stat-chip">🎬 Total <span id="statTotal">0</span></div>
  <div class="stat-chip">✅ Watched <span id="statWatched">0</span></div>
  <div class="stat-chip">⏳ Unwatched <span id="statUnwatched">0</span></div>
  <div class="stat-chip">★ Favorites <span id="statFavs">0</span></div>
</div>

<!-- Progress -->
<div id="progressBar"><div id="progress"></div></div>

<!-- Filters -->
<div id="filters">
  <button class="filter-pill active" onclick="setFilter('all', this)">All</button>
  <button class="filter-pill" onclick="setFilter('watched', this)">Watched</button>
  <button class="filter-pill" onclick="setFilter('unwatched', this)">Unwatched</button>
  <button class="filter-pill" onclick="setFilter('favorites', this)">Favorites</button>
</div>

<div class="container" id="MovieList"></div>
<p id="EmptyMsg">No movies found 🎭</p>

<div id="toast"></div>

<script>
const API_KEY = "279e916fb273ebd5f4db034459cad740";

let movies = JSON.parse(localStorage.getItem("movies")) || [];
let activeFilter = "all";

function save() {
  localStorage.setItem("movies", JSON.stringify(movies));
}

function showToast(msg) {
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2000);
}

async function fetchMovieData(name) {
  try {
    let res = await fetch(
      `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(name)}`
    );
    let data = await res.json();

    if (data.results && data.results[0]) {
      let m = data.results[0];
      return {
        poster: m.poster_path
          ? "https://image.tmdb.org/t/p/w500" + m.poster_path
          : "https://via.placeholder.com/300x450",
        rating: m.vote_average,
        year: m.release_date ? m.release_date.split("-")[0] : "N/A"
      };
    }
  } catch {}

  return { poster: "https://via.placeholder.com/300x450", rating: "N/A", year: "N/A" };
}

async function addMovie() {
  let name = document.getElementById("movieInput").value.trim();
  let cat = document.getElementById("Category").value;

  if (!name) return showToast("Enter movie name");

  if (movies.some(m => m.name.toLowerCase() === name.toLowerCase()))
    return showToast("Already exists");

  showToast("Fetching...");
  let data = await fetchMovieData(name);

  movies.push({ name, category: cat, watched: false, favorite: false, ...data });
  save();
  displayMovies();

  document.getElementById("movieInput").value = "";
  showToast("Added!");
}

function deleteMovie(i) {
  movies.splice(i, 1);
  save();
  displayMovies();
}

function toggleWatched(i) {
  movies[i].watched = !movies[i].watched;
  save();
  displayMovies();
}

function toggleFavorite(i) {
  movies[i].favorite = !movies[i].favorite;
  save();
  displayMovies();
}

function setFilter(filter, el) {
  activeFilter = filter;
  document.querySelectorAll(".filter-pill").forEach(p => p.classList.remove("active"));
  el.classList.add("active");
  applyFilters();
}

function applyFilters() {
  let q = document.getElementById("searchInput").value.toLowerCase();

  let filtered = movies.filter(m => {
    if (!m.name.toLowerCase().includes(q)) return false;

    if (activeFilter === "all") return true;
    if (activeFilter === "watched") return m.watched;
    if (activeFilter === "unwatched") return !m.watched;
    if (activeFilter === "favorites") return m.favorite;

    return true;
  });

  displayMovies(filtered);
}

function updateStats() {
  document.getElementById("statTotal").textContent = movies.length;
  document.getElementById("statWatched").textContent = movies.filter(m => m.watched).length;
  document.getElementById("statUnwatched").textContent = movies.filter(m => !m.watched).length;
  document.getElementById("statFavs").textContent = movies.filter(m => m.favorite).length;
}

function displayMovies(list = movies) {
  let container = document.getElementById("MovieList");
  let emptyMsg = document.getElementById("EmptyMsg");

  container.innerHTML = "";

  let watchedCount = movies.filter(m => m.watched).length;
  let percent = movies.length ? (watchedCount / movies.length) * 100 : 0;
  document.getElementById("progress").style.width = percent + "%";

  updateStats();

  if (list.length === 0) {
    emptyMsg.style.display = "block";
  } else {
    emptyMsg.style.display = "none";
  }

  list.forEach(m => {
    let i = movies.indexOf(m);

    container.innerHTML += `
      <div class="card">
        <img src="${m.poster}">
        <h3 class="${m.watched ? 'watched' : ''} ${m.favorite ? 'favorite' : ''}">
          ${m.name}
        </h3>
        <p>${m.year} | ⭐ ${typeof m.rating === 'number' ? m.rating.toFixed(1) : m.rating}</p>
        <p>${m.category}</p>

        <button class="small-btn" onclick="toggleWatched(${i})">
          ${m.watched ? "Unwatch" : "Watched"}
        </button>

        <button class="small-btn" onclick="toggleFavorite(${i})">
          ${m.favorite ? "Unfav" : "Fav"}
        </button>

        <button class="small-btn" onclick="deleteMovie(${i})">
          Delete
        </button>
      </div>
    `;
  });
}

function randomMovie() {
  if (!movies.length) return showToast("No movies!");
  let m = movies[Math.floor(Math.random() * movies.length)];
  showToast("Watch: " + m.name);
}

document.getElementById("movieInput").addEventListener("keypress", e => {
  if (e.key === "Enter") addMovie();
});

displayMovies();
</script>

</body>
</html>
