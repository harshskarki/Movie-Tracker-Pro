<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Tracker Pro+</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --red: #e50914;
    --red-bright: #ff2d2d;
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #888;
    --gold: #f5c518;
    --radius: 12px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(180deg, #000 0%, transparent 100%);
    padding: 2rem 2rem 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.25rem;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    color: var(--red);
    letter-spacing: 2px;
    flex: 1;
  }

  .logo span { color: var(--text); }

  /* ── Controls ── */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }

  input, select {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, select:focus { border-color: var(--red); }

  #movieInput { flex: 1; min-width: 180px; }
  #searchInput { width: 200px; }

  select { cursor: pointer; }
  select option { background: var(--surface2); }

  button {
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s, opacity 0.2s;
  }

  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-primary { background: var(--red); color: white; }
  .btn-primary:not(:disabled):hover { background: var(--red-bright); }

  .btn-ghost {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--border); }

  /* ── Progress ── */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0.75rem 2rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }

  .progress-track {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  #progress {
    height: 100%;
    background: var(--red);
    border-radius: 99px;
    width: 0%;
    transition: width 0.4s ease;
  }

  #progressLabel {
    font-size: 13px;
    color: var(--muted);
    white-space: nowrap;
  }

  /* ── Filter bar ── */
  .filter-bar {
    display: flex;
    gap: 8px;
    padding: 1rem 2rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-label { font-size: 13px; color: var(--muted); margin-right: 4px; }

  .filter-btn {
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 99px;
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .filter-btn.active {
    background: var(--red);
    color: white;
    border-color: var(--red);
  }

  .filter-btn:hover:not(.active) { color: var(--text); border-color: #444; }

  /* ── Grid ── */
  #movieList {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 16px;
    padding: 0 2rem 3rem;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
    position: relative;
  }

  .card:hover { transform: translateY(-4px); border-color: #444; }

  .card-poster {
    width: 100%;
    aspect-ratio: 2/3;
    object-fit: cover;
    display: block;
    background: var(--surface2);
  }

  .card-body { padding: 12px; }

  .card-title {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 6px;
  }

  .card-title.watched {
    text-decoration: line-through;
    color: var(--muted);
  }

  .card-meta {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 99px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-weight: 500;
  }

  .card-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .card-btn {
    flex: 1;
    font-size: 12px;
    padding: 6px 8px;
    border-radius: 6px;
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    min-width: 0;
  }

  .card-btn:hover { background: var(--border); }
  .card-btn.danger:hover { background: #3a1010; border-color: #7a2020; color: #ff6b6b; }
  .card-btn.fav-active { color: var(--gold); border-color: var(--gold); }

  /* Watched overlay badge */
  .watched-badge {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(0,0,0,0.75);
    border: 1px solid #444;
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 99px;
    color: #aaa;
    backdrop-filter: blur(4px);
  }

  /* ── Empty state ── */
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 4rem 1rem;
    color: var(--muted);
  }

  .empty-icon { font-size: 3rem; margin-bottom: 1rem; }
  .empty h3 { font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--text); }
  .empty p { font-size: 14px; }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── Loading spinner on card ── */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<body>

<header>
  <div class="header-top">
    <div class="logo">MOVIE<span>TRACKER</span></div>
    <input id="searchInput" placeholder="Search movies..." oninput="searchMovies()">
  </div>
  <div class="controls">
    <input id="movieInput" placeholder="Add a movie title..." />
    <select id="categorySelect">
      <option value="Action">Action</option>
      <option value="Comedy">Comedy</option>
      <option value="Drama">Drama</option>
      <option value="Horror">Horror</option>
      <option value="Sci-Fi">Sci-Fi</option>
      <option value="Romance">Romance</option>
      <option value="Thriller">Thriller</option>
      <option value="Documentary">Documentary</option>
    </select>
    <button class="btn-primary" id="addBtn" onclick="addMovie()">+ Add</button>
    <button class="btn-ghost" onclick="randomMovie()">🎲 Surprise Me</button>
  </div>
</header>

<div class="progress-wrap">
  <div class="progress-track"><div id="progress"></div></div>
  <span id="progressLabel">0 / 0 watched</span>
</div>

<div class="filter-bar">
  <span class="filter-label">Filter:</span>
  <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn" data-filter="unwatched" onclick="setFilter('unwatched', this)">Unwatched</button>
  <button class="filter-btn" data-filter="watched" onclick="setFilter('watched', this)">Watched</button>
  <button class="filter-btn" data-filter="favorites" onclick="setFilter('favorites', this)">★ Favorites</button>
  <button class="filter-btn" data-filter="Action" onclick="setFilter('Action', this)">Action</button>
  <button class="filter-btn" data-filter="Comedy" onclick="setFilter('Comedy', this)">Comedy</button>
  <button class="filter-btn" data-filter="Drama" onclick="setFilter('Drama', this)">Drama</button>
  <button class="filter-btn" data-filter="Horror" onclick="setFilter('Horror', this)">Horror</button>
  <button class="filter-btn" data-filter="Sci-Fi" onclick="setFilter('Sci-Fi', this)">Sci-Fi</button>
</div>

<div id="movieList"></div>

<div id="toast"></div>

<script>
  const API_KEY = "279e916fb273ebd5f4db034459cad740";

  let movies = JSON.parse(localStorage.getItem("movies_v2")) || [];
  let currentFilter = "all";
  let searchQuery = "";
  let lastRandomId = null;
  let toastTimer = null;
  let isAdding = false;

  /* ── Helpers ── */

  function save() {
    localStorage.setItem("movies_v2", JSON.stringify(movies));
  }

  function escape(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function showToast(msg) {
    clearTimeout(toastTimer);
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    toastTimer = setTimeout(() => t.classList.remove("show"), 2500);
  }

  /* ── TMDB fetch ── */

  async function fetchMovieData(name) {
    const url = `https://api.themoviedb.org/3/search/movie?api_key=${279e916fb273ebd5f4db034459cad740}&query=${encodeURIComponent(name)}&language=en-US&page=1`;
    try {
      const res = await fetch(url, { method: "GET", headers: { "Accept": "application/json" } });

      if (res.status === 401) { showToast("⚠️ Invalid API key"); return { poster: null, rating: "N/A", year: "N/A" }; }
      if (res.status === 429) { showToast("⚠️ Too many requests"); return { poster: null, rating: "N/A", year: "N/A" }; }
      if (!res.ok) { showToast("⚠️ TMDB error: " + res.status); return { poster: null, rating: "N/A", year: "N/A" }; }

      const data = await res.json();

      if (data.results && data.results.length > 0) {
        const m = data.results[0];
        return {
          poster: m.poster_path ? "https://image.tmdb.org/t/p/w500" + m.poster_path : null,
          rating: m.vote_average ? Number(m.vote_average).toFixed(1) : "N/A",
          year: m.release_date ? m.release_date.split("-")[0] : "N/A"
        };
      } else {
        showToast("ℹ️ No results found for that title");
        return { poster: null, rating: "N/A", year: "N/A" };
      }
    } catch (err) {
      console.error("Fetch error:", err.message);
      if (err.message && err.message.includes("Failed to fetch")) {
        showToast("⚠️ Network error — check your connection");
      } else {
        showToast("⚠️ Could not reach TMDB");
      }
      return { poster: null, rating: "N/A", year: "N/A" };
    }
  }

  /* ── Add movie ── */

  async function addMovie() {
    if (isAdding) return;
    const nameRaw = document.getElementById("movieInput").value.trim();
    if (!nameRaw) return showToast("⚠️ Enter a movie name");

    const nameLower = nameRaw.toLowerCase();
    if (movies.some(m => m.name.toLowerCase() === nameLower)) {
      return showToast("❌ Already in your list");
    }

    isAdding = true;
    const addBtn = document.getElementById("addBtn");
    addBtn.disabled = true;
    addBtn.innerHTML = '<span class="spinner"></span>Fetching...';

    const cat = document.getElementById("categorySelect").value;
    const data = await fetchMovieData(nameRaw);

    movies.push({
      id: Date.now(),
      name: nameRaw,
      category: cat,
      watched: false,
      favorite: false,
      poster: data.poster,
      rating: data.rating,
      year: data.year
    });

    save();
    displayMovies();
    showToast("✅ Added: " + nameRaw);
    document.getElementById("movieInput").value = "";

    addBtn.disabled = false;
    addBtn.textContent = "+ Add";
    isAdding = false;
  }

  /* ── Mutations (by stable ID) ── */

  function deleteMovie(id) {
    movies = movies.filter(m => m.id !== id);
    save();
    displayMovies();
    showToast("🗑 Removed");
  }

  function toggleWatched(id) {
    const m = movies.find(m => m.id === id);
    if (m) { m.watched = !m.watched; save(); displayMovies(); }
  }

  function toggleFavorite(id) {
    const m = movies.find(m => m.id === id);
    if (m) { m.favorite = !m.favorite; save(); displayMovies(); }
  }

  /* ── Filter & search ── */

  function setFilter(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    displayMovies();
  }

  function searchMovies() {
    searchQuery = document.getElementById("searchInput").value.toLowerCase();
    displayMovies();
  }

  function getFilteredMovies() {
    return movies.filter(m => {
      const matchSearch = m.name.toLowerCase().includes(searchQuery);
      let matchFilter = true;
      if (currentFilter === "watched") matchFilter = m.watched;
      else if (currentFilter === "unwatched") matchFilter = !m.watched;
      else if (currentFilter === "favorites") matchFilter = m.favorite;
      else if (currentFilter !== "all") matchFilter = m.category === currentFilter;
      return matchSearch && matchFilter;
    });
  }

  /* ── Display ── */

  function displayMovies() {
    const container = document.getElementById("movieList");
    const filtered = getFilteredMovies();

    // Progress bar uses full movies list
    const watchedCount = movies.filter(m => m.watched).length;
    const total = movies.length;
    const pct = total ? (watchedCount / total) * 100 : 0;
    document.getElementById("progress").style.width = pct + "%";
    document.getElementById("progressLabel").textContent = `${watchedCount} / ${total} watched`;

    if (filtered.length === 0) {
      container.innerHTML = `
        <div class="empty">
          <div class="empty-icon">🎬</div>
          <h3>${movies.length === 0 ? "Your list is empty" : "No matches found"}</h3>
          <p>${movies.length === 0 ? "Add a movie to get started" : "Try a different search or filter"}</p>
        </div>`;
      return;
    }

    const fallbackPoster = "https://placehold.co/300x450/141414/888?text=No+Image";

    container.innerHTML = filtered.map(m => `
      <div class="card">
        ${m.watched ? '<div class="watched-badge">Watched</div>' : ''}
        <img class="card-poster"
             src="${m.poster || fallbackPoster}"
             alt="${escape(m.name)}"
             onerror="this.src='${fallbackPoster}'">
        <div class="card-body">
          <div class="card-title ${m.watched ? 'watched' : ''}">${escape(m.name)}</div>
          <div class="card-meta">
            <span>📅 ${escape(m.year)}</span>
            <span>⭐ ${escape(m.rating)}</span>
            <span class="badge">${escape(m.category)}</span>
          </div>
          <div class="card-actions">
            <button class="card-btn" onclick="toggleWatched(${m.id})">
              ${m.watched ? "Unwatch" : "✓ Watched"}
            </button>
            <button class="card-btn ${m.favorite ? 'fav-active' : ''}" onclick="toggleFavorite(${m.id})">
              ${m.favorite ? "★" : "☆"}
            </button>
            <button class="card-btn danger" onclick="deleteMovie(${m.id})">✕</button>
          </div>
        </div>
      </div>
    `).join("");
  }

  /* ── Random (no repeat) ── */

  function randomMovie() {
    const unwatched = movies.filter(m => !m.watched);
    const pool = unwatched.length > 0 ? unwatched : movies;
    if (!pool.length) return showToast("No movies in your list!");

    let candidates = pool.filter(m => m.id !== lastRandomId);
    if (!candidates.length) candidates = pool; // only 1 movie edge case

    const pick = candidates[Math.floor(Math.random() * candidates.length)];
    lastRandomId = pick.id;
    showToast("🎬 Watch tonight: " + pick.name);
  }

  /* ── Keyboard shortcut ── */

  document.getElementById("movieInput").addEventListener("keypress", e => {
    if (e.key === "Enter") addMovie();
  });

  /* ── Init ── */
  displayMovies();
</script>

</body>
</html>
