<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🎬 Movie Tracker Pro</title>
<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
  color: white;
  text-align: center;
  margin: 0;
  padding: 0 0 60px 0;
}

h1 { color: #e50914; margin-bottom: 5px; }

input, select {
  padding: 10px;
  margin: 5px;
  border-radius: 5px;
  border: none;
  background: #2a2a2a;
  color: white;
}

button {
  padding: 10px;
  background: #e50914;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 5px;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  background: #ff1f1f;
}

/* ── Stats Bar ── */
#statsBar {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 12px auto 6px;
  flex-wrap: wrap;
}

.stat-chip {
  background: #1c1c1c;
  border: 1px solid #333;
  border-radius: 20px;
  padding: 6px 16px;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.stat-chip span.num {
  color: #e50914;
  font-weight: bold;
  font-size: 15px;
}

/* ── Filter Pills ── */
#filters {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px;
  margin: 10px auto;
}

.filter-pill {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid #444;
  background: transparent;
  color: #aaa;
  cursor: pointer;
  font-size: 13px;
  transition: 0.2s;
}

.filter-pill:hover,
.filter-pill.active {
  background: #e50914;
  border-color: #e50914;
  color: white;
  transform: none;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: #1c1c1c;
  padding: 10px;
  border-radius: 10px;
  transition: 0.3s;
}

.card:hover { transform: scale(1.05); }

.card img {
  width: 100%;
  border-radius: 10px;
}

.watched { text-decoration: line-through; color: gray; }
.favorite { color: gold; }

.small-btn {
  margin: 3px;
  padding: 5px;
  font-size: 12px;
}

#toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  padding: 10px 20px;
  border-radius: 5px;
  display: none;
  z-index: 999;
}

#progressBar {
  width: 80%;
  margin: 10px auto;
  background: #333;
  border-radius: 10px;
}

#progress {
  height: 10px;
  background: #e50914;
  width: 0%;
  border-radius: 10px;
  transition: width 0.4s ease;
}

#emptyMsg {
  display: none;
  margin-top: 40px;
  color: #555;
  font-size: 16px;
}

/* Footer */
footer {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  color: #777;
  font-size: 12px;
  padding: 8px 0;
}
</style>
</head>

<body>

<h1>🎬 Movie Tracker Pro</h1>

<input id="movieInput" placeholder="Movie name">
<select id="category">
  <option>Action</option>
  <option>Comedy</option>
  <option>Drama</option>
  <option>Horror</option>
</select>
<button onclick="addMovie()">Add</button>
<button onclick="randomMovie()">🎲 Surprise Me</button>

<br>
<input id="searchInput" placeholder="Search..." onkeyup="applyFilters()">

<!-- Stats -->
<div id="statsBar">
  <div class="stat-chip">🎬 Total <span class="num" id="statTotal">0</span></div>
  <div class="stat-chip">✅ Watched <span class="num" id="statWatched">0</span></div>
  <div class="stat-chip">⏳ Unwatched <span class="num" id="statUnwatched">0</span></div>
  <div class="stat-chip">★ Favorites <span class="num" id="statFavs">0</span></div>
</div>

<!-- Progress -->
<div id="progressBar"><div id="progress"></div></div>

<!-- Filter Pills -->
<div id="filters">
  <button class="filter-pill active" data-filter="all" onclick="setFilter('all', this)">All</button>
  <button class="filter-pill" data-filter="watched" onclick="setFilter('watched', this)">✅ Watched</button>
  <button class="filter-pill" data-filter="unwatched" onclick="setFilter('unwatched', this)">⏳ Unwatched</button>
  <button class="filter-pill" data-filter="favorites" onclick="setFilter('favorites', this)">★ Favorites</button>
  <button class="filter-pill" data-filter="Action" onclick="setFilter('Action', this)">Action</button>
  <button class="filter-pill" data-filter="Comedy" onclick="setFilter('Comedy', this)">Comedy</button>
  <button class="filter-pill" data-filter="Drama" onclick="setFilter('Drama', this)">Drama</button>
  <button class="filter-pill" data-filter="Horror" onclick="setFilter('Horror', this)">Horror</button>
</div>

<div class="container" id="movieList"></div>
<p id="emptyMsg">No movies match this filter 🎭</p>
<div id="toast"></div>

<!-- ✅ Added Footer -->
<footer>
  Made by harshskarki 🚀
</footer>

<script>
const API_KEY = "279e916fb273ebd5f4db034459cad740";

let movies = JSON.parse(localStorage.getItem("movies")) || [];
let activeFilter = "all";

function save() {
  localStorage.setItem("movies", JSON.stringify(movies));
}

function showToast(msg) {
  let t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2000);
}

async function fetchMovieData(name) {
  try {
    let res = await fetch(
      `https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(name)}`
    );
    let data = await res.json();
    if (data.results && data.results[0]) {
      let movie = data.results[0];
      return {
        poster: movie.poster_path
          ? "https://image.tmdb.org/t/p/w500" + movie.poster_path
          : "https://via.placeholder.com/300x450?text=No+Image",
        rating: movie.vote_average,
        year: movie.release_date ? movie.release_date.split("-")[0] : "N/A"
      };
    }
  } catch {}
  return { poster: "https://via.placeholder.com/300x450?text=No+Image", rating: "N/A", year: "N/A" };
}

async function addMovie() {
  let name = movieInput.value.trim();
  let cat = document.getElementById("category").value;
  if (!name) return showToast("⚠️ Enter movie name");
  if (movies.some(m => m.name.toLowerCase() === name.toLowerCase()))
    return showToast("❌ Already exists");

  showToast("⏳ Fetching...");
  let data = await fetchMovieData(name);

  movies.push({ name, category: cat, watched: false, favorite: false, ...data });
  save();
  displayMovies();
  showToast("✅ Added!");
  movieInput.value = "";
}

function deleteMovie(i) {
  movies.splice(i, 1);
  save();
  displayMovies();
  showToast("🗑 Deleted");
}

function toggleWatched(i) {
  movies[i].watched = !movies[i].watched;
  save();
  displayMovies();
}

function toggleFavorite(i) {
  movies[i].favorite = !movies[i].favorite;
  save();
  displayMovies();
}

function setFilter(filter, el) {
  activeFilter = filter;
  document.querySelectorAll(".filter-pill").forEach(p => p.classList.remove("active"));
  el.classList.add("active");
  applyFilters();
}

function applyFilters() {
  let q = document.getElementById("searchInput").value.toLowerCase();

  let filtered = movies.filter(m => {
    const matchSearch = m.name.toLowerCase().includes(q);
    if (!matchSearch) return false;

    if (activeFilter === "all") return true;
    if (activeFilter === "watched") return m.watched;
    if (activeFilter === "unwatched") return !m.watched;
    if (activeFilter === "favorites") return m.favorite;
    return m.category === activeFilter;
  });

  displayMovies(filtered);
}

function updateStats() {
  document.getElementById("statTotal").textContent = movies.length;
  document.getElementById("statWatched").textContent = movies.filter(m => m.watched).length;
  document.getElementById("statUnwatched").textContent = movies.filter(m => !m.watched).length;
  document.getElementById("statFavs").textContent = movies.filter(m => m.favorite).length;
}

function displayMovies(list = movies) {
  let container = document.getElementById("movieList");
  let emptyMsg = document.getElementById("emptyMsg");
  container.innerHTML = "";

  let watchedCount = movies.filter(m => m.watched).length;
  let percent = movies.length ? (watchedCount / movies.length) * 100 : 0;
  document.getElementById("progress").style.width = percent + "%";

  updateStats();

  if (list.length === 0) {
    emptyMsg.style.display = "block";
  } else {
    emptyMsg.style.display = "none";
  }

  list.forEach((m) => {
    const realIndex = movies.indexOf(m);
    container.innerHTML += `
      <div class="card">
        <img src="${m.poster}" alt="${m.name}">
        <h3 class="${m.watched ? 'watched' : ''} ${m.favorite ? 'favorite' : ''}">${m.name}</h3>
        <p>📅 ${m.year} | ⭐ ${typeof m.rating === 'number' ? m.rating.toFixed(1) : m.rating}</p>
        <p style="color:#888;font-size:13px">${m.category}</p>
        <button class="small-btn" onclick="toggleWatched(${realIndex})">${m.watched ? "Unwatch" : "✅ Watched"}</button>
        <button class="small-btn" onclick="toggleFavorite(${realIndex})">${m.favorite ? "★ Unfav" : "☆ Fav"}</button>
        <button class="small-btn" onclick="deleteMovie(${realIndex})">🗑 Delete</button>
      </div>
    `;
  });
}

function randomMovie() {
  if (!movies.length) return showToast("No movies!");
  let m = movies[Math.floor(Math.random() * movies.length)];
  showToast("🎬 Watch: " + m.name);
}

document.getElementById("movieInput").addEventListener("keypress", e => {
  if (e.key === "Enter") addMovie();
});

displayMovies();
</script>

</body>
</html>
